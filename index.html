<!DOCTYPE html>
<html>
<head>
    <title>AI Product Generator</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 0;
            color: white;
        }

        .container {
            width: 50%;
            margin: auto;
            margin-top: 60px;
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
        }

        input, textarea, select {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f1f1f1;
            border-radius: 10px;
        }

        .copy-btn {
            margin-top: 10px;
            background: green;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🛒 AI Product Generator</h1>

    <form method="POST" onsubmit="loading()">

        <input type="text" name="product_name" placeholder="Enter Product Name" required>

        <textarea name="features" placeholder="Enter Product Features" required></textarea>

        <select name="tone">
            <option value="professional">Professional</option>
            <option value="marketing">Marketing</option>
            <option value="friendly">Friendly</option>
        </select>

        <button id="btn" type="submit">Generate</button>
    </form>

    {% if result %}
    <div class="result">
        <h3>Generated Description:</h3>
        <p id="output">{{ result }}</p>

        <button class="copy-btn" onclick="copyText()">📋 Copy</button>
    </div>
    {% endif %}
</div>

<script>
function loading(){
    document.getElementById("btn").innerText = "Generating...";
}

function copyText(){
    const text = document.getElementById("output").innerText;
    navigator.clipboard.writeText(text);
    alert("Copied!");
}
</script>

</body>
</html>
